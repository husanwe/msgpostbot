services:
  swag:
    image: linuxserver/swag
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - URL=${DOMAIN_NAME}
      - VALIDATION=http
    volumes:
      - ./swag:/config
    ports:
      - 80:80
      - 443:443
    restart: unless-stopped

  bot:
    image: ghcr.io/husanwe/msgpostbot:${IMAGE_TAG}
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379/0
      GROUP_ID: ${GROUP_ID}
      DOMAIN_NAME: ${DOMAIN_NAME}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  redis_data:
