services:
  msgpostbot:
    image: ghcr.io/husan-eshonqulov/msgpostbot:${IMAGE_TAG}
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379/0
      GROUP_ID: ${GROUP_ID}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  redis_data:
